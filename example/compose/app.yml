name: schemaf-example

x-schemaf:
  project: schemaf-example
  short-name: app
  depends-on-compose:
    - ../../compose/postgres.yml
  env-overrides-when-absent:
    FRONTEND_URL: http://host.docker.internal:7002

services:
  backend:
    build:
      context: ../backend
    container_name: schemaf-example-backend
    environment:
      SCHEMAF_ENV: docker
      DB_PASS: ${DB_PASS}
      PORT: "7001"
      BACKEND_URL: http://schemaf-example-backend:7001
      FRONTEND_URL: http://schemaf-example-frontend:80
    networks:
      - schemaf-example-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      schemaf-example-postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    container_name: schemaf-example-frontend
    networks:
      - schemaf-example-net

networks:
  schemaf-example-net:
    name: schemaf-example-net
