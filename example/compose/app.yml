name: atlas-example

x-atlas:
  project: atlas-example
  short-name: app
  depends-on-compose:
    - ../../compose/postgres.yml
    - ../../compose/nginx.yml
  env-overrides-when-absent:
    FRONTEND_URL: http://host.docker.internal:7002

services:
  backend:
    build:
      context: ../backend
    container_name: atlas-example-backend
    environment:
      ATLAS_ENV: docker
      DB_PASS: ${DB_PASS}
      PORT: "7001"
      BACKEND_URL: http://atlas-example-backend:7001
      FRONTEND_URL: http://atlas-example-frontend:80
    networks:
      - atlas-example-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      atlas-example-postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    container_name: atlas-example-frontend
    networks:
      - atlas-example-net

networks:
  atlas-example-net:
    name: atlas-example-net
