services:
  nginx:
    build:
      context: ../web
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "7000:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:7001}
      FRONTEND_URL: ${FRONTEND_URL:-http://host.docker.internal:7002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ${PROJECT_NAME}-net
    restart: unless-stopped
    x-atlas:
      short-name: nginx

networks:
  ${PROJECT_NAME}-net:
    external: true
    name: ${PROJECT_NAME}-net
