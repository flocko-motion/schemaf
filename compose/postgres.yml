services:
  postgres:
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME}-postgres
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${PROJECT_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:7003:5432"
    restart: unless-stopped
    x-atlas:
      short-name: db

networks:
  net:
    driver: bridge
    name: ${PROJECT_NAME}-net

volumes:
  postgres-data:
    name: ${PROJECT_NAME}-postgres-data
